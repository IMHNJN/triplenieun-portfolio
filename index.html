<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hyunjun Yoon | Developer Portfolio</title>
    <meta
      name="description"
      content="Backend developer portfolio focused on structured problem solving, reliable implementation, and collaboration."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,500;6..72,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="language-toggle" role="group" aria-label="Language selector">
      <button type="button" class="lang-button is-active" data-lang="ko">KR</button>
      <button type="button" class="lang-button" data-lang="en">EN</button>
    </div>

    <aside class="side-nav" aria-label="Section navigation">
      <nav class="side-nav-links">
        <a href="#home" class="nav-link is-active">
          <span class="nav-icon nav-icon-home" aria-hidden="true"></span>
          <span class="nav-text" data-nav="home"></span>
        </a>
        <a href="#projects" class="nav-link">
          <span class="nav-icon nav-icon-projects" aria-hidden="true"></span>
          <span class="nav-text" data-nav="projects"></span>
        </a>
        <a href="#experiences" class="nav-link">
          <span class="nav-icon nav-icon-experience" aria-hidden="true"></span>
          <span class="nav-text" data-nav="experience"></span>
        </a>
        <a href="#contact" class="nav-link">
          <span class="nav-icon nav-icon-contact" aria-hidden="true"></span>
          <span class="nav-text" data-nav="contact"></span>
        </a>
      </nav>
    </aside>

    <main class="page-shell">
      <section id="home" class="section hero">
        <div class="content-block hero-block">
          <p id="hero-kicker" class="hero-kicker"></p>
          <h1>Hyunjun Yoon</h1>
          <p id="hero-summary" class="hero-summary"></p>
          <div class="inline-links">
            <a href="https://github.com/IMHNJN" target="_blank" rel="noreferrer">GitHub</a>
            <a href="https://www.linkedin.com/in/triplenieun/" target="_blank" rel="noreferrer">LinkedIn</a>
          </div>
        </div>
      </section>

      <section id="projects" class="section section-panel">
        <div class="content-block">
          <div id="project-list-view" class="project-view is-visible">
            <div class="section-head">
              <h2 id="projects-heading"></h2>
            </div>

            <div id="project-list" class="project-list"></div>
          </div>

          <article
            id="project-detail-view"
            class="project-view project-detail"
            aria-live="polite"
            hidden
          >
            <button type="button" id="project-back-button" class="back-link"></button>
            <h3 id="detail-title"></h3>
            <p class="status-pill">
              <span class="status-dot" aria-hidden="true"></span>
              <span id="detail-status"></span>
            </p>
            <p id="detail-summary" class="detail-summary"></p>
            <div id="detail-tags" class="tag-list"></div>
            <div class="detail-grid">
              <div>
                <p id="detail-role-label" class="detail-label"></p>
                <p id="detail-role"></p>
              </div>
              <div>
                <p id="detail-outcome-label" class="detail-label"></p>
                <p id="detail-outcome"></p>
              </div>
            </div>
          </article>
        </div>
      </section>

      <section id="experiences" class="section section-panel">
        <div class="content-block experience-block">
          <div class="section-head">
            <h2 id="experience-heading"></h2>
            <p class="experience-intro">
              <strong id="experience-intro-strong"></strong>
              <span id="experience-intro-text"></span>
            </p>
          </div>

          <div class="stack-groups">
            <div class="stack-group">
              <p id="primary-stack-label" class="stack-label"></p>
              <div id="primary-stack-tags" class="tag-list"></div>
            </div>

            <div class="stack-group">
              <p id="tools-stack-label" class="stack-label"></p>
              <div id="tools-stack-tags" class="tag-list"></div>
            </div>
          </div>

          <div id="timeline-list" class="timeline"></div>
        </div>
      </section>

      <section id="contact" class="section">
        <div class="content-block contact-block">
          <div class="section-head">
            <h2 id="contact-heading"></h2>
          </div>
          <p id="contact-copy" class="contact-copy"></p>
          <a id="contact-button" class="contact-button" href="mailto:triplenieun@gmail.com"></a>
        </div>
      </section>
    </main>

    <script src="./content.js"></script>
    <script>
      const content = window.portfolioContent;
      let currentLanguage = localStorage.getItem("portfolio-language") || "ko";
      let currentProjectKey = Object.keys(content.ko.projects.items)[0];

      const pageShell = document.querySelector(".page-shell");
      const navLinks = document.querySelectorAll(".nav-link");
      const navTextMap = {
        home: document.querySelector('[data-nav="home"]'),
        projects: document.querySelector('[data-nav="projects"]'),
        experience: document.querySelector('[data-nav="experience"]'),
        contact: document.querySelector('[data-nav="contact"]'),
      };
      const langButtons = document.querySelectorAll(".lang-button");
      const observedSections = document.querySelectorAll("main section[id]");
      const projectList = document.getElementById("project-list");
      const projectListView = document.getElementById("project-list-view");
      const projectDetailView = document.getElementById("project-detail-view");
      const projectBackButton = document.getElementById("project-back-button");
      const heroKicker = document.getElementById("hero-kicker");
      const heroSummary = document.getElementById("hero-summary");
      const projectsHeading = document.getElementById("projects-heading");
      const detailTitle = document.getElementById("detail-title");
      const detailStatus = document.getElementById("detail-status");
      const detailSummary = document.getElementById("detail-summary");
      const detailRoleLabel = document.getElementById("detail-role-label");
      const detailRole = document.getElementById("detail-role");
      const detailOutcomeLabel = document.getElementById("detail-outcome-label");
      const detailOutcome = document.getElementById("detail-outcome");
      const detailTags = document.getElementById("detail-tags");
      const experienceHeading = document.getElementById("experience-heading");
      const experienceIntroStrong = document.getElementById("experience-intro-strong");
      const experienceIntroText = document.getElementById("experience-intro-text");
      const primaryStackLabel = document.getElementById("primary-stack-label");
      const toolsStackLabel = document.getElementById("tools-stack-label");
      const primaryStackTags = document.getElementById("primary-stack-tags");
      const toolsStackTags = document.getElementById("tools-stack-tags");
      const timelineList = document.getElementById("timeline-list");
      const contactHeading = document.getElementById("contact-heading");
      const contactCopy = document.getElementById("contact-copy");
      const contactButton = document.getElementById("contact-button");
      const desktopFullPageMedia = window.matchMedia("(min-width: 761px)");
      const sectionSequence = Array.from(observedSections);
      const validSectionIds = Array.from(observedSections, (section) => section.id);
      const sectionAnimationDuration = 720;
      let activeSectionId = validSectionIds[0] || "home";
      let isSectionAnimating = false;
      let sectionAnimationTimerId = null;

      function getSectionById(id) {
        return id ? document.getElementById(id) : null;
      }

      function getValidSectionId(id) {
        return validSectionIds.includes(id) ? id : "home";
      }

      function isDesktopFullPageEnabled() {
        return desktopFullPageMedia.matches;
      }

      function getSectionIndex(id) {
        return validSectionIds.indexOf(getValidSectionId(id));
      }

      function getActiveSectionIndex() {
        return Math.max(getSectionIndex(activeSectionId), 0);
      }

      function clearSectionAnimationLock() {
        isSectionAnimating = false;
        window.clearTimeout(sectionAnimationTimerId);
        sectionAnimationTimerId = null;
      }

      function lockSectionAnimation() {
        clearSectionAnimationLock();
        isSectionAnimating = true;
        sectionAnimationTimerId = window.setTimeout(() => {
          clearSectionAnimationLock();
        }, sectionAnimationDuration);
      }

      function scrollToSection(id, behavior = "smooth") {
        const targetId = getValidSectionId(id);
        const section = getSectionById(targetId);
        if (!section) return;

        activeSectionId = targetId;

        if (!isDesktopFullPageEnabled()) {
          section.scrollIntoView({ behavior, block: "start" });
          return;
        }

        const top = section.offsetTop;

        if (behavior === "auto") {
          clearSectionAnimationLock();
          pageShell.scrollTop = top;
          return;
        }

        lockSectionAnimation();
        pageShell.scrollTo({ top, behavior });
      }

      function moveToSectionByIndex(index, options = {}) {
        const safeIndex = Math.min(Math.max(index, 0), sectionSequence.length - 1);
        const targetId = sectionSequence[safeIndex]?.id;
        if (!targetId) return;

        const behavior = options.behavior || "smooth";
        const pushHistory = options.pushHistory === true;

        setActiveLink(targetId);
        if (pushHistory) {
          history.pushState({ view: targetId }, "", "#" + targetId);
        }
        scrollToSection(targetId, behavior);
      }

      function findScrollablePanel(target) {
        return target instanceof Element ? target.closest(".section-panel .content-block") : null;
      }

      function panelCanScroll(panel, direction) {
        if (!panel) return false;

        const maxScrollTop = panel.scrollHeight - panel.clientHeight;
        if (maxScrollTop <= 2) return false;

        if (direction > 0) {
          return panel.scrollTop + panel.clientHeight < panel.scrollHeight - 2;
        }

        return panel.scrollTop > 2;
      }

      function shouldIgnoreKeyboardFullPage(event) {
        if (!(event.target instanceof Element)) return false;

        return Boolean(
          event.target.closest(
            'button, a, input, textarea, select, [contenteditable="true"], [role="button"]'
          )
        );
      }

      function renderTagList(container, tags) {
        container.innerHTML = "";

        tags.forEach((tag) => {
          const span = document.createElement("span");
          span.textContent = tag;
          container.appendChild(span);
        });
      }

      function renderProjectList() {
        const items = content[currentLanguage].projects.items;

        projectList.innerHTML = "";

        Object.entries(items).forEach(([key, project]) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "project-row";
          button.dataset.project = key;

          const copy = document.createElement("span");
          copy.className = "project-copy";

          const title = document.createElement("strong");
          title.textContent = project.listTitle;

          const summary = document.createElement("span");
          summary.textContent = project.listSummary;

          const arrow = document.createElement("span");
          arrow.className = "project-arrow";
          arrow.setAttribute("aria-hidden", "true");
          arrow.textContent = ">";

          copy.appendChild(title);
          copy.appendChild(summary);
          button.appendChild(copy);
          button.appendChild(arrow);
          projectList.appendChild(button);
        });
      }

      function renderTimeline() {
        const timeline = content[currentLanguage].experience.timeline;

        timelineList.innerHTML = "";

        timeline.forEach((item) => {
          const article = document.createElement("article");
          article.className = "timeline-item";

          const period = document.createElement("p");
          period.className = "timeline-period";
          period.textContent = item.period;

          const title = document.createElement("h3");
          title.textContent = item.title;

          const place = document.createElement("p");
          place.className = "timeline-place";
          place.textContent = item.place;

          const body = document.createElement("p");
          body.className = "timeline-body";
          body.textContent = item.body;

          article.appendChild(period);
          article.appendChild(title);
          article.appendChild(place);
          article.appendChild(body);
          timelineList.appendChild(article);
        });
      }

      function setActiveLink(id, syncHash = false) {
        activeSectionId = getValidSectionId(id);

        navLinks.forEach((link) => {
          const isActive = link.getAttribute("href") === "#" + activeSectionId;
          link.classList.toggle("is-active", isActive);
          if (isActive) {
            link.setAttribute("aria-current", "page");
          } else {
            link.removeAttribute("aria-current");
          }
        });

        if (
          syncHash &&
          !document.body.classList.contains("project-detail-open") &&
          window.location.hash !== "#" + activeSectionId
        ) {
          history.replaceState({ view: activeSectionId }, "", "#" + activeSectionId);
        }
      }

      function renderStaticContent() {
        const dictionary = content[currentLanguage];

        Object.entries(navTextMap).forEach(([key, element]) => {
          element.textContent = dictionary.nav[key];
        });

        heroKicker.textContent = dictionary.hero.kicker;
        heroSummary.textContent = dictionary.hero.summary;
        projectsHeading.textContent = dictionary.projects.heading;
        projectBackButton.textContent = dictionary.projects.back;
        detailRoleLabel.textContent = dictionary.projects.role;
        detailOutcomeLabel.textContent = dictionary.projects.outcome;
        renderProjectList();

        experienceHeading.textContent = dictionary.experience.heading;
        experienceIntroStrong.textContent = dictionary.experience.introStrong;
        experienceIntroText.textContent = dictionary.experience.intro;
        primaryStackLabel.textContent = dictionary.experience.primaryStack;
        toolsStackLabel.textContent = dictionary.experience.toolsStack;
        renderTagList(primaryStackTags, dictionary.experience.primaryTags);
        renderTagList(toolsStackTags, dictionary.experience.toolsTags);
        renderTimeline();

        contactHeading.textContent = dictionary.contact.heading;
        contactCopy.textContent = dictionary.contact.copy;
        contactButton.textContent = dictionary.contact.button;
      }

      function renderProject(key) {
        const project = content[currentLanguage].projects.items[key];
        if (!project) return;

        currentProjectKey = key;
        detailTitle.textContent = project.title;
        detailStatus.textContent = project.status;
        detailSummary.textContent = project.summary;
        detailRole.textContent = project.role;
        detailOutcome.textContent = project.outcome;

        renderTagList(detailTags, project.tags);

        document.querySelectorAll(".project-row").forEach((row) => {
          row.classList.toggle("is-selected", row.dataset.project === key);
        });
      }

      function setLanguage(language) {
        currentLanguage = language;
        localStorage.setItem("portfolio-language", language);
        document.documentElement.lang = language;

        langButtons.forEach((button) => {
          button.classList.toggle("is-active", button.dataset.lang === language);
        });

        renderStaticContent();
        renderProject(currentProjectKey);
      }

      function showProjectList(pushHistory = true) {
        document.body.classList.remove("project-detail-open");
        document.documentElement.classList.remove("project-detail-open");
        projectListView.hidden = false;
        projectDetailView.hidden = true;
        projectListView.classList.add("is-visible");
        projectDetailView.classList.remove("is-visible");

        if (pushHistory) {
          history.pushState({ view: "projects" }, "", "#projects");
        }
      }

      function showProjectDetail(key, pushHistory = true) {
        renderProject(key);
        document.body.classList.add("project-detail-open");
        document.documentElement.classList.add("project-detail-open");
        projectListView.hidden = true;
        projectDetailView.hidden = false;
        projectListView.classList.remove("is-visible");
        projectDetailView.classList.add("is-visible");

        if (pushHistory) {
          history.pushState({ view: "project-detail", project: key }, "", "#projects");
        }
      }

      navLinks.forEach((link) => {
        link.addEventListener("click", (event) => {
          event.preventDefault();
          const targetId = link.getAttribute("href")?.replace("#", "");
          if (!targetId) return;

          if (document.body.classList.contains("project-detail-open")) {
            showProjectList(false);
          }

          moveToSectionByIndex(getSectionIndex(targetId), { pushHistory: true });
        });
      });

      langButtons.forEach((button) => {
        button.addEventListener("click", () => {
          setLanguage(button.dataset.lang);
        });
      });

      projectList.addEventListener("click", (event) => {
        const row = event.target.closest(".project-row");
        if (!row) return;

        showProjectDetail(row.dataset.project);
      });

      projectBackButton.addEventListener("click", () => {
        if (history.state?.view === "project-detail") {
          history.back();
          return;
        }

        showProjectList(false);
      });

      window.addEventListener("popstate", (event) => {
        if (event.state?.view === "project-detail" && event.state.project) {
          showProjectDetail(event.state.project, false);
          return;
        }

        const targetId = getValidSectionId(event.state?.view || window.location.hash.replace("#", ""));

        if (document.body.classList.contains("project-detail-open")) {
          showProjectList(false);
        }

        setActiveLink(targetId);
        scrollToSection(targetId, "auto");
      });

      const sectionObserver = new IntersectionObserver(
        (entries) => {
          const visibleEntries = entries
            .filter((entry) => entry.isIntersecting)
            .sort((a, b) => b.intersectionRatio - a.intersectionRatio);

          if (visibleEntries[0] && !isSectionAnimating) {
            setActiveLink(visibleEntries[0].target.id, true);
          }
        },
        {
          threshold: [0.35, 0.55, 0.75],
          rootMargin: "-15% 0px -40% 0px",
        }
      );

      observedSections.forEach((section) => sectionObserver.observe(section));

      pageShell.addEventListener(
        "wheel",
        (event) => {
          if (!isDesktopFullPageEnabled() || document.body.classList.contains("project-detail-open")) {
            return;
          }

          const direction = Math.sign(event.deltaY);
          if (!direction) return;

          const panel = findScrollablePanel(event.target);
          if (panelCanScroll(panel, direction)) {
            return;
          }

          event.preventDefault();

          if (isSectionAnimating) {
            return;
          }

          moveToSectionByIndex(getActiveSectionIndex() + direction);
        },
        { passive: false }
      );

      window.addEventListener("keydown", (event) => {
        if (!isDesktopFullPageEnabled() || document.body.classList.contains("project-detail-open")) {
          return;
        }

        if (shouldIgnoreKeyboardFullPage(event)) {
          return;
        }

        let nextIndex = null;

        if (event.key === "ArrowDown" || event.key === "PageDown") {
          nextIndex = getActiveSectionIndex() + 1;
        } else if (event.key === "ArrowUp" || event.key === "PageUp") {
          nextIndex = getActiveSectionIndex() - 1;
        } else if (event.key === "Home") {
          nextIndex = 0;
        } else if (event.key === "End") {
          nextIndex = sectionSequence.length - 1;
        } else if (event.key === " " && !event.shiftKey) {
          nextIndex = getActiveSectionIndex() + 1;
        } else if (event.key === " " && event.shiftKey) {
          nextIndex = getActiveSectionIndex() - 1;
        }

        if (nextIndex === null) return;

        event.preventDefault();

        if (isSectionAnimating) {
          return;
        }

        moveToSectionByIndex(nextIndex);
      });

      desktopFullPageMedia.addEventListener("change", () => {
        clearSectionAnimationLock();
        requestAnimationFrame(() => {
          scrollToSection(activeSectionId, "auto");
        });
      });

      setLanguage(currentLanguage);

      const initialHash = getValidSectionId(window.location.hash.replace("#", ""));
      setActiveLink(initialHash);
      history.replaceState({ view: initialHash }, "", "#" + initialHash);
      requestAnimationFrame(() => {
        scrollToSection(initialHash, "auto");
      });
    </script>
  </body>
</html>
